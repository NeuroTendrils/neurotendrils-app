name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  QT_VERSION: "6.11.1"
  QT_VERSION_WINDOWS: "6.10.3"
  QT_MODULES: "qtquick3d qtshadertools qtquicktimeline"

jobs:
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches CMake version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CMAKE_VERSION=$(grep -oE 'VERSION [0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt | awk '{print $2}')

          if [ -z "$CMAKE_VERSION" ]; then
            echo "Could not parse VERSION from CMakeLists.txt"
            exit 1
          fi

          if [ "$TAG_VERSION" != "$CMAKE_VERSION" ]; then
            echo "Tag v${TAG_VERSION} does not match CMake VERSION ${CMAKE_VERSION}"
            exit 1
          fi

          echo "Release version ${CMAKE_VERSION} verified."

  build-windows:
    needs: verify-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION_WINDOWS }}
          modules: ${{ env.QT_MODULES }}
          cache: true
          cache-key-prefix: install-qt-${{ env.QT_VERSION_WINDOWS }}-quick3d-deps

      - name: Verify Qt
        shell: bash
        run: |
          echo "QT_ROOT_DIR=$QT_ROOT_DIR"
          "$QT_ROOT_DIR/bin/qmake" -query QT_VERSION
          test -f "$QT_ROOT_DIR/lib/cmake/Qt6Quick3D/Qt6Quick3DConfig.cmake"
          test -f "$QT_ROOT_DIR/lib/cmake/Qt6Quick3DRuntimeRender/Qt6Quick3DRuntimeRenderConfig.cmake"
          test -f "$QT_ROOT_DIR/lib/cmake/Qt6ShaderTools/Qt6ShaderToolsConfig.cmake"
          test -f "$QT_ROOT_DIR/lib/cmake/Qt6QuickTimeline/Qt6QuickTimelineConfig.cmake"
          HEADER=$(find "$QT_ROOT_DIR" -name qstylehints.h | head -1)
          grep setColorScheme "$HEADER"

      - name: Configure
        shell: bash
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR" \
            -DQt6_DIR="$QT_ROOT_DIR/lib/cmake/Qt6"

      - name: Build
        shell: bash
        run: cmake --build build --config Release

      - name: Deploy Qt runtime
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path build -Recurse -Filter "NeuroTendrils.exe" | Select-Object -First 1
          if (-not $exe) {
            throw "NeuroTendrils.exe not found under build/"
          }
          # The QML scene ships inside the Qt resource system, so point
          # windeployqt at the source qml dir to bundle Quick/Quick3D plugins.
          windeployqt $exe.FullName --qmldir "$(Get-Location)\qml"

      - name: Package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".Substring(1)
          $exe = Get-ChildItem -Path build -Recurse -Filter "NeuroTendrils.exe" | Select-Object -First 1
          $dir = $exe.Directory.FullName
          # Ensure the atlas sits next to the exe (POST_BUILD should already copy it).
          New-Item -ItemType Directory -Force -Path "$dir\resources" | Out-Null
          Copy-Item -Force "assets\brain\brain.glb" "$dir\resources\brain.glb"
          $archive = "NeuroTendrils-windows-x64-$version.zip"
          Compress-Archive -Path "$dir\*" -DestinationPath $archive

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: NeuroTendrils-windows-x64-*.zip

  build-macos:
    needs: verify-version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          modules: ${{ env.QT_MODULES }}
          cache: true
          cache-key-prefix: install-qt-${{ env.QT_VERSION }}-quick3d-deps

      - name: Verify Qt
        run: |
          echo "QT_ROOT_DIR=$QT_ROOT_DIR"
          "$QT_ROOT_DIR/bin/qmake" -query QT_VERSION
          test -f "$QT_ROOT_DIR/lib/cmake/Qt6Quick3D/Qt6Quick3DConfig.cmake"
          test -f "$QT_ROOT_DIR/lib/cmake/Qt6Quick3DRuntimeRender/Qt6Quick3DRuntimeRenderConfig.cmake"
          test -f "$QT_ROOT_DIR/lib/cmake/Qt6ShaderTools/Qt6ShaderToolsConfig.cmake"
          test -f "$QT_ROOT_DIR/lib/cmake/Qt6QuickTimeline/Qt6QuickTimelineConfig.cmake"
          HEADER=$(find "$QT_ROOT_DIR" -name qstylehints.h | head -1)
          grep setColorScheme "$HEADER"

      - name: Configure
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR" \
            -DQt6_DIR="$QT_ROOT_DIR/lib/cmake/Qt6"

      - name: Build
        run: cmake --build build

      - name: Deploy Qt runtime
        run: |
          macdeployqt build/NeuroTendrils.app -always-overwrite -qmldir=qml
          # RuntimeLoader needs the assimp asset importer; macdeployqt does not
          # always pull it from -qmldir alone.
          mkdir -p build/NeuroTendrils.app/Contents/PlugIns/assetimporters
          cp -R "$QT_ROOT_DIR/plugins/assetimporters/." \
            build/NeuroTendrils.app/Contents/PlugIns/assetimporters/
          # macdeployqt leaves the bundle unsigned / invalidly signed. Ad-hoc
          # sign so Gatekeeper doesn't report the download as "damaged".
          codesign --force --deep --sign - build/NeuroTendrils.app
          xattr -cr build/NeuroTendrils.app

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ditto -c -k --keepParent \
            build/NeuroTendrils.app \
            "NeuroTendrils-macos-arm64-${VERSION}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: NeuroTendrils-macos-arm64-*.zip

  build-linux:
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-cursor-dev \
            file \
            fuse \
            libfuse2

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          modules: ${{ env.QT_MODULES }}
          cache: true
          cache-key-prefix: install-qt-${{ env.QT_VERSION }}-quick3d-deps

      - name: Verify Qt
        run: |
          echo "QT_ROOT_DIR=$QT_ROOT_DIR"
          "$QT_ROOT_DIR/bin/qmake" -query QT_VERSION
          test -f "$QT_ROOT_DIR/lib/cmake/Qt6Quick3D/Qt6Quick3DConfig.cmake"
          test -f "$QT_ROOT_DIR/lib/cmake/Qt6Quick3DRuntimeRender/Qt6Quick3DRuntimeRenderConfig.cmake"
          test -f "$QT_ROOT_DIR/lib/cmake/Qt6ShaderTools/Qt6ShaderToolsConfig.cmake"
          test -f "$QT_ROOT_DIR/lib/cmake/Qt6QuickTimeline/Qt6QuickTimelineConfig.cmake"
          HEADER=$(find "$QT_ROOT_DIR" -name qstylehints.h | head -1)
          grep setColorScheme "$HEADER"

      - name: Configure
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR" \
            -DQt6_DIR="$QT_ROOT_DIR/lib/cmake/Qt6"

      - name: Build
        run: cmake --build build

      - name: Create AppImage
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage

          # Let the Qt plugin scan our QML for Quick/Quick3D import dependencies.
          export QML_SOURCES_PATHS="$PWD/qml"

          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            -e build/NeuroTendrils \
            -d packaging/linux/NeuroTendrils.desktop \
            -i packaging/linux/NeuroTendrils.png \
            --plugin qt

          # Brain atlas ships beside the binary (not embedded in the executable).
          mkdir -p AppDir/usr/bin/resources
          cp assets/brain/brain.glb AppDir/usr/bin/resources/brain.glb

          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --output appimage

          APPIMAGE=$(ls -1 NeuroTendrils*.AppImage 2>/dev/null | head -1)
          if [ -z "$APPIMAGE" ]; then
            APPIMAGE=$(ls -1 *.AppImage | grep -v linuxdeploy | head -1)
          fi
          mv "$APPIMAGE" "NeuroTendrils-linux-x86_64-${VERSION}.AppImage"
          chmod +x "NeuroTendrils-linux-x86_64-${VERSION}.AppImage"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: NeuroTendrils-linux-x86_64-*.AppImage

  build-linux-arm64:
    needs: verify-version
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-cursor-dev \
            file \
            fuse \
            libfuse2

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          modules: ${{ env.QT_MODULES }}
          cache: true
          cache-key-prefix: install-qt-${{ env.QT_VERSION }}-quick3d-deps

      - name: Verify Qt
        run: |
          echo "QT_ROOT_DIR=$QT_ROOT_DIR"
          "$QT_ROOT_DIR/bin/qmake" -query QT_VERSION
          test -f "$QT_ROOT_DIR/lib/cmake/Qt6Quick3D/Qt6Quick3DConfig.cmake"
          test -f "$QT_ROOT_DIR/lib/cmake/Qt6Quick3DRuntimeRender/Qt6Quick3DRuntimeRenderConfig.cmake"
          test -f "$QT_ROOT_DIR/lib/cmake/Qt6ShaderTools/Qt6ShaderToolsConfig.cmake"
          test -f "$QT_ROOT_DIR/lib/cmake/Qt6QuickTimeline/Qt6QuickTimelineConfig.cmake"
          HEADER=$(find "$QT_ROOT_DIR" -name qstylehints.h | head -1)
          grep setColorScheme "$HEADER"

      - name: Configure
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR" \
            -DQt6_DIR="$QT_ROOT_DIR/lib/cmake/Qt6"

      - name: Build
        run: cmake --build build

      - name: Create AppImage
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-aarch64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-aarch64.AppImage
          chmod +x linuxdeploy*.AppImage

          # Let the Qt plugin scan our QML for Quick/Quick3D import dependencies.
          export QML_SOURCES_PATHS="$PWD/qml"

          ./linuxdeploy-aarch64.AppImage \
            --appdir AppDir \
            -e build/NeuroTendrils \
            -d packaging/linux/NeuroTendrils.desktop \
            -i packaging/linux/NeuroTendrils.png \
            --plugin qt

          # Brain atlas ships beside the binary (not embedded in the executable).
          mkdir -p AppDir/usr/bin/resources
          cp assets/brain/brain.glb AppDir/usr/bin/resources/brain.glb

          ./linuxdeploy-aarch64.AppImage \
            --appdir AppDir \
            --output appimage

          APPIMAGE=$(ls -1 NeuroTendrils*.AppImage 2>/dev/null | head -1)
          if [ -z "$APPIMAGE" ]; then
            APPIMAGE=$(ls -1 *.AppImage | grep -v linuxdeploy | head -1)
          fi
          mv "$APPIMAGE" "NeuroTendrils-linux-aarch64-${VERSION}.AppImage"
          chmod +x "NeuroTendrils-linux-aarch64-${VERSION}.AppImage"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-aarch64
          path: NeuroTendrils-linux-aarch64-*.AppImage

  release:
    needs: [build-windows, build-macos, build-linux, build-linux-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: "*"
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
